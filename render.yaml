databases:
  - name: ai-news-aggregator-db
    databaseName: ai_news_aggregator
    user: postgres
    plan: free

services:
  - type: cron
    name: ai-news-aggregator-job
    env: python
    plan: free
    schedule: "0 9 * * *" # Runs daily at 9:00 AM UTC
    buildCommand: "pip install --upgrade pip && pip install uv && uv pip install --system torch --index-url https://download.pytorch.org/whl/cpu && uv pip install --system -r requirements.txt"
    startCommand: "python main.py"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-news-aggregator-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: RECEIVER_EMAIL
        sync: false
